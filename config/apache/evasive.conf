<IfModule mod_evasive20.c>
    DOSEnabled true
    DOSHashTableSize 1000

    DOSHTTPStatus 429

    # 10 to same page in 2 seconds
    DOSPageCount        10
    DOSPageInterval     2

    # 50 requests to entire site in 10 seconds
    DOSSiteCount        50
    DOSSiteInterval     10

    # How long in seconds to block an offending IP
    DOSBlockingPeriod   30

    # Log blocked IPs
    DOSLogDir           /var/log/apache2/evasive

    # AllowList
    # DOSWhitelist      127.0.0.1
</IfModule>