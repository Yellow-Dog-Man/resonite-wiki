# Proxy PDF requests to the Proton service
# This provides an endpoint at /api/pdf/ that proxies
# to the Proton Chromium-based PDF renderer
# See: https://www.mediawiki.org/wiki/Extension:ElectronPdfService
<IfModule proxy_module>
    <IfModule proxy_http_module>
        ProxyPass /api/pdf/ http://resonite-wiki-proton:3030/wiki.resonite.com/v1/pdf/
        ProxyPassReverse /api/pdf/ http://resonite-wiki-proton:3030/wiki.resonite.com/v1/pdf/
    </IfModule>
</IfModule>
