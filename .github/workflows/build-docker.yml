name: 'Build and publish a Docker container image'

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '*.md'
  release:
    types:
      - published

permissions:
  packages: write
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: 'Build & Publish ${{ matrix.image-name }}'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image-name: "Wiki"
            docker-image-name: '${{ github.repository }}'
            dockerfile-path: 'Dockerfile'

          - image-name: "Utilities"
            docker-image-name: '${{ github.repository_owner }}/resonite-wiki-utilities'
            dockerfile-path: 'Dockerfile.utilities'

          - image-name: "Proton"
            docker-image-name: '${{ github.repository_owner }}/resonite-wiki-proton'
            dockerfile-path: 'Dockerfile.proton'

    steps:
      - name: 'Checkout current repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: 'Build Docker image'
        uses: Yellow-Dog-Man/composite-actions-templates/.github/actions/docker-build-push@b4f799dd8ed863b11a1df3e27d1a243e89509dbe
        with:
          docker-image-name: '${{ matrix.docker-image-name }}'
          docker-token: '${{ github.token }}'
          dockerfile-path: '${{ matrix.dockerfile-path }}'